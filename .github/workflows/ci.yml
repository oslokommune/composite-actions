name: ci

on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    # NOTE: A bit stricter than the default bash options used by GitHub Actions
    shell: bash --noprofile --norc -euo pipefail {0}

permissions: {}

jobs:
  test-determine-stacks:
    name: Test determine-stacks composite action
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run tests
        working-directory: ./determine-stacks
        run: uv run pytest -v

  test-evaluate-automerge:
    name: Test evaluate-automerge composite action
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Run tests
        working-directory: ./evaluate-automerge
        run: make test

  test-terraform-deploy:
    name: Test terraform-deploy composite action
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Run tests
        working-directory: ./terraform-deploy
        run: python3 test_extract_outputs.py

  test-e2e-build-gp-config:
    name: Test E2E build-gp-config composite action
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Run tests
        working-directory: ./build-gp-config
        run: make test

      - name: Run build-gp-config action
        id: build
        uses: ./build-gp-config
        with:
          # The config file and schema used don't need to be the actual config or schema. We just want to test that the
          # composite action can output a valid config.
          config-file: build-gp-config/testdata-ci/dummy-config.json
          app-name: hello-world
          stack-name: app-hello-world

      - name: Verify output
        env:
          CONFIG: ${{ steps.build.outputs.config }}
        run: |
          echo "$CONFIG"
          test "$(echo "$CONFIG" | jq -r '.appName')" = "hello-world"
          test "$(echo "$CONFIG" | jq -r '.dev.stackDir')" = "stacks/dev/app-hello-world"
          test "$(echo "$CONFIG" | jq -r '.dev.concurrencyGroup')" = "test-dev-hello-world"

      - name: Run build-gp-config action (invalid config)
        id: build-invalid
        uses: ./build-gp-config
        continue-on-error: true
        with:
          config-file: build-gp-config/testdata-ci/invalid-config.json
          app-name: hello-world
          stack-name: app-hello-world

      - name: Verify invalid config was rejected
        run: test "${{ steps.build-invalid.outcome }}" = "failure"

  test-e2e-package-and-upload-artifact-s3:
    name: Test E2E package-and-upload-artifact composite action (S3)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      statuses: write
    services:
      moto:
        image: motoserver/moto:5.1.22@sha256:117238c6e7e3b566387c4c74e6fb0b6fdc34a094920c2154cf06f11dc72d9f37
        ports:
          - 5000:5000
    env:
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:5000
      CONFIG: |
        {
          "dev": {
            "accountId": "123456789012",
            "defaultRegion": "us-east-1",
            "artifactRoleArn": "arn:aws:iam::123456789012:role/test",
            "artifactBucketName": "test-dev-bucket",
            "artifactEcrRepositoryName": "test-dev-ecr"
          },
          "prod": {
            "accountId": "210987654321",
            "defaultRegion": "us-east-1",
            "artifactRoleArn": "arn:aws:iam::210987654321:role/test",
            "artifactBucketName": "test-prod-bucket",
            "artifactEcrRepositoryName": "test-prod-ecr"
          }
        }
      CONFIG_DEV: |
        {
          "dev": {
            "accountId": "123456789012",
            "defaultRegion": "us-east-1",
            "artifactRoleArn": "arn:aws:iam::123456789012:role/test",
            "artifactBucketName": "test-dev-bucket",
            "artifactEcrRepositoryName": "test-dev-ecr"
          }
        }
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Prepare S3 buckets and dummy files
        run: |
          aws s3 mb s3://test-dev-bucket
          aws s3 mb s3://test-prod-bucket
          echo "hello world" > sample.txt

      - name: Test file upload to all environments
        id: file-upload-both
        uses: ./package-and-upload-artifact
        with:
          config: ${{ env.CONFIG }}
          tag: "test-app/v1.0.0"
          source-location: "sample.txt"
          source-type: "file"

      - name: Verify name of uploaded file
        env:
          RESULT: ${{ steps.file-upload-both.outputs.result }}
        run: test "$RESULT" = "test-app/v1.0.0.txt"

      - name: Verify file has been uploaded to both S3 buckets
        run: |
          aws s3api head-object --bucket test-dev-bucket --key "test-app/v1.0.0.txt"
          aws s3api head-object --bucket test-prod-bucket --key "test-app/v1.0.0.txt"

      - name: Prepare test folder
        run: |
          mkdir -p test-upload-folder
          touch test-upload-folder/hello

      - name: Test folder upload to dev environment
        id: folder-upload
        uses: ./package-and-upload-artifact
        with:
          config: ${{ env.CONFIG_DEV }}
          tag: "test-app/v2.0.0"
          source-location: "test-upload-folder"
          source-type: "folder"

      - name: Verify name of uploaded file
        env:
          RESULT: ${{ steps.folder-upload.outputs.result }}
        run: test "$RESULT" = "test-app/v2.0.0.zip"

      - name: Verify uploaded file is a valid zip
        run: |
          aws s3api get-object --bucket test-dev-bucket --key "test-app/v2.0.0.zip" /tmp/downloaded.zip
          unzip -l /tmp/downloaded.zip | grep "hello"

      - name: Prepare nested test folder
        # Regression test: source-location with multiple path segments used to
        # break because the archive was written relative to the source folder's
        # parent, but then referenced by a bare filename in the repo root.
        run: |
          mkdir -p apps/webapp/dist
          touch apps/webapp/dist/nested-file

      - name: Test folder upload from nested source-location
        id: nested-folder-upload
        uses: ./package-and-upload-artifact
        with:
          config: ${{ env.CONFIG_DEV }}
          tag: "test-app/v3.0.0"
          source-location: "apps/webapp/dist"
          source-type: "folder"

      - name: Verify nested folder upload produced a valid zip
        run: |
          aws s3api get-object --bucket test-dev-bucket --key "test-app/v3.0.0.zip" /tmp/nested-downloaded.zip
          unzip -l /tmp/nested-downloaded.zip | grep "nested-file"

  test-e2e-package-and-upload-artifact-docker:
    name: Test E2E package-and-upload-artifact composite action (Docker)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      statuses: write
    services:
      moto:
        image: motoserver/moto:5.1.22@sha256:117238c6e7e3b566387c4c74e6fb0b6fdc34a094920c2154cf06f11dc72d9f37
        ports:
          - 5000:5000
    env:
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:5000
      CONFIG: |
        {
          "dev": {
            "accountId": "123456789012",
            "defaultRegion": "us-east-1",
            "artifactRoleArn": "arn:aws:iam::123456789012:role/test",
            "artifactBucketName": "test-dev-bucket",
            "artifactEcrRepositoryName": "test-dev-ecr"
          },
          "prod": {
            "accountId": "210987654321",
            "defaultRegion": "us-east-1",
            "artifactRoleArn": "arn:aws:iam::210987654321:role/test",
            "artifactBucketName": "test-prod-bucket",
            "artifactEcrRepositoryName": "test-prod-ecr"
          }
        }
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Prepare Docker mock
        run: |
          mkdir -p "$HOME/mock-bin"
          # Moto Server does not allow you to do "docker push" to a mocked ECR repo,
          # so we instead just create a "mock" Docker binary that logs its arguments
          cat > "$HOME/mock-bin/docker" << 'EOF'
          #!/usr/bin/env bash
          echo "$@" >> /tmp/docker-mock.log
          # Drain stdin to avoid broken pipe when password is piped to "docker login --password-stdin"
          if [ "$1" = "login" ]; then cat > /dev/null; fi
          EOF
          chmod +x "$HOME/mock-bin/docker"
          echo "$HOME/mock-bin" >> "$GITHUB_PATH"

      - name: Test Docker image upload
        id: docker-upload
        uses: ./package-and-upload-artifact
        with:
          config: ${{ env.CONFIG }}
          tag: "test-app/v1.0.0"
          source-location: "sha256:abc123"
          source-type: "docker-image"

      - name: Verify Docker commands
        run: |
          echo "Docker commands:"
          cat /tmp/docker-mock.log

          line_count="$(wc -l < /tmp/docker-mock.log)"
          test "$line_count" -eq 6

          grep -q "tag sha256:abc123 123456789012.dkr.ecr.us-east-1.amazonaws.com/test-dev-ecr:test-app/v1.0.0" /tmp/docker-mock.log
          grep -q "push 123456789012.dkr.ecr.us-east-1.amazonaws.com/test-dev-ecr:test-app/v1.0.0" /tmp/docker-mock.log
          grep -q "tag sha256:abc123 210987654321.dkr.ecr.us-east-1.amazonaws.com/test-prod-ecr:test-app/v1.0.0" /tmp/docker-mock.log
          grep -q "push 210987654321.dkr.ecr.us-east-1.amazonaws.com/test-prod-ecr:test-app/v1.0.0" /tmp/docker-mock.log

  test-e2e-terraform-deploy:
    name: Test E2E terraform-deploy
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    services:
      moto:
        image: motoserver/moto:5.1.22@sha256:117238c6e7e3b566387c4c74e6fb0b6fdc34a094920c2154cf06f11dc72d9f37
        ports:
          - 5000:5000
    env:
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:5000
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Prepare ephemeral SSH deploy key
        id: ssh-key
        run: |
          ssh-keygen -t ed25519 -f "$RUNNER_TEMP/test-key" -N "" -q
          {
            echo "private-key<<EOF"
            cat "$RUNNER_TEMP/test-key"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare Terraform stack
        run: |
          mkdir -p test-stack
          cat > test-stack/main.tf << 'EOF'
          terraform {
            required_version = ">= 1.9.0"
          }

          output "greeting" {
            value     = "hello"
            sensitive = false
          }

          output "secret" {
            value     = "s3cret"
            sensitive = true
          }
          EOF

      - name: Run terraform-deploy
        id: deploy
        uses: ./terraform-deploy
        with:
          config: |
            {
              "dev": {
                "accountId": "123456789012",
                "defaultRegion": "us-east-1",
                "deploymentRoleArn": "arn:aws:iam::123456789012:role/test",
                "name": "test-dev"
              },
              "team": "test-team",
              "appName": "test-app"
            }
          stack-dir: "test-stack"
          environment: "dev"
          # Tag matches the format produced by `generate-tag` so the embedded short SHA path
          # in the deployment-event step can be exercised.
          tag: "test-app-20260101000000-12345-abcdef12-main"
          github-deploy-key: ${{ steps.ssh-key.outputs.private-key }}
          cancel-if-stale: "false"
          # Force-enable the deployment event step regardless of github event/branch context
          send-deployment-event: "true"
          # Force-disable deployment metric which defaults to true if an API key is set
          send-deployment-metric: "false"
          # The curl call will be rejected by Datadog (fake key), but `continue-on-error`
          # absorbs the failure and the payload is written to the step output beforehand.
          datadog-api-key: "fake-test-key"

      - name: Verify SSM parameter was set
        run: |
          value="$(aws ssm get-parameter --name "/test-dev/artifacts/test-stack" --query "Parameter.Value" --output text)"
          test "$value" = "test-app-20260101000000-12345-abcdef12-main"

      - name: Verify Terraform outputs
        env:
          OUTPUTS: ${{ steps.deploy.outputs.terraform-outputs }}
        run: |
          echo "$OUTPUTS"
          test "$(echo "$OUTPUTS" | jq -r '.greeting')" = "hello"
          test "$(echo "$OUTPUTS" | jq 'has("secret")')" = "false"

      - name: Verify Datadog DORA deployment event payload
        env:
          PAYLOAD: ${{ steps.deploy.outputs.__internal-datadog-dora-result }}
          EXPECTED_VERSION: "test-app-20260101000000-12345-abcdef12-main"
        run: |
          echo "$PAYLOAD" | jq
          test -n "$PAYLOAD"
          test "$(echo "$PAYLOAD" | jq -r '.data.attributes.env')" = "dev"
          test "$(echo "$PAYLOAD" | jq -r '.data.attributes.team')" = "test-team"
          test "$(echo "$PAYLOAD" | jq -r '.data.attributes.service')" = "test-app"
          test "$(echo "$PAYLOAD" | jq -r '.data.attributes.version')" = "$EXPECTED_VERSION"
          test "$(echo "$PAYLOAD" | jq -r '.data.attributes.git.commit_sha')" = "$GITHUB_SHA"
          test "$(echo "$PAYLOAD" | jq -r '.data.attributes.git.repository_url')" = "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"

  test-e2e-terraform-deploy-regression-test-terraform-v1-15-0:
    # Regression test for hashicorp/terraform#38484: Terraform 1.15.0 emits the
    # S3 backend's `dynamodb_table` deprecation warning to stdout, contaminating
    # `terraform output -json`. Pin to exactly 1.15.0 so this keeps reproducing
    # the bug until it's fixed upstream; once fixed, drop this job (or update
    # the pin and the trigger).
    name: Test E2E terraform-deploy (regression test for Terraform v1.15.0)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    services:
      moto:
        image: motoserver/moto:5.1.22@sha256:117238c6e7e3b566387c4c74e6fb0b6fdc34a094920c2154cf06f11dc72d9f37
        ports:
          - 5000:5000
    env:
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:5000
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Prepare ephemeral SSH deploy key
        id: ssh-key
        run: |
          ssh-keygen -t ed25519 -f "$RUNNER_TEMP/test-key" -N "" -q
          {
            echo "private-key<<EOF"
            cat "$RUNNER_TEMP/test-key"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare S3 state bucket and DynamoDB lock table
        run: |
          aws s3 mb s3://test-tfstate
          aws dynamodb create-table \
            --table-name test-tflocks \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST >/dev/null

      - name: Prepare Terraform stack
        run: |
          mkdir -p test-stack
          cat > test-stack/main.tf << 'EOF'
          terraform {
            required_version = "= 1.15.0"
            backend "s3" {
              bucket         = "test-tfstate"
              key            = "test-stack.tfstate"
              region         = "us-east-1"
              dynamodb_table = "test-tflocks"
              # moto on localhost has no virtual-host DNS, so force path-style addressing.
              # Endpoint + creds come from AWS_ENDPOINT_URL / AWS_ACCESS_KEY_ID env vars.
              use_path_style = true
            }
          }

          output "greeting" {
            value     = "hello"
            sensitive = false
          }
          EOF

      - name: Run terraform-deploy
        id: deploy
        uses: ./terraform-deploy
        with:
          config: |
            {
              "dev": {
                "accountId": "123456789012",
                "defaultRegion": "us-east-1",
                "deploymentRoleArn": "arn:aws:iam::123456789012:role/test",
                "name": "test-dev"
              }
            }
          stack-dir: "test-stack"
          environment: "dev"
          tag: "test-app/v1.0.0"
          github-deploy-key: ${{ steps.ssh-key.outputs.private-key }}
          cancel-if-stale: "false"

      - name: Verify Terraform outputs survive the polluted stdout
        env:
          OUTPUTS: ${{ steps.deploy.outputs.terraform-outputs }}
        run: |
          echo "$OUTPUTS"
          test "$(echo "$OUTPUTS" | jq -r '.greeting')" = "hello"

      - name: Verify Terraform 1.15.0 still emits the deprecation warning to stdout
        # Sanity check: if this assertion stops holding (e.g. HashiCorp backports
        # a fix or routes the warning to stderr), the regression scenario is gone
        # and this whole job should be removed.
        working-directory: test-stack
        run: |
          terraform output -json >stdout.txt 2>/dev/null
          echo "Output from Terraform CLI":
          cat stdout.txt
          grep -q '"value": "hello"' stdout.txt
          # `.*` between tokens absorbs the ANSI color escape codes Terraform
          # interleaves with the warning text in CI output.
          grep -q '│.*Warning:.*Deprecated Parameter' stdout.txt
